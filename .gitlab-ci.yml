# ============================================================================
# CI/CD — Vietnam Traffic Law Chatbot (monorepo)
# Repo: https://git.dth.com.vn/jmix-team/research/traffic-law/core
#
# Pipeline stages:
#   test      → backend unit tests + frontend lint/test  (main + MRs)
#   package   → build & push backend + frontend images  (main only)
#   deploy    → production auto-deploy  (main only)
#
# Required CI/CD Variables (Settings → CI/CD → Variables):
#   SSH_PRIVATE_KEY   — private key deploy (protected, not masked)
#   SSH_KNOWN_HOSTS   — output of: ssh-keyscan <server-host>
#   SERVER_USER       — SSH user trên server (e.g. deploy)
#   SERVER_HOST       — IP hoặc hostname server
#
# GitLab built-ins (tự động):
#   CI_REGISTRY, CI_REGISTRY_IMAGE, CI_REGISTRY_USER, CI_REGISTRY_PASSWORD
# ============================================================================

stages:
  - test
  - package
  - deploy

variables:
  DOCKER_BUILDKIT: "1"
  DOCKER_TLS_CERTDIR: "/certs"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

default:
  interruptible: true

# ============================================================================
# TEST — backend + frontend chạy song song
# ============================================================================
test-backend:
  stage: test
  image: eclipse-temurin:25-jdk-alpine
  services:
    - name: pgvector/pgvector:pg16
      alias: postgres
  variables:
    POSTGRES_DB: traffic_law_test
    POSTGRES_USER: app
    POSTGRES_PASSWORD: app_test_secret
    SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/traffic_law_test"
    SPRING_DATASOURCE_USERNAME: app
    SPRING_DATASOURCE_PASSWORD: app_test_secret
    SPRING_AI_OPENAI_API_KEY: dummy-key-not-used-in-unit-tests
  cache:
    key:
      files:
        - build.gradle
        - settings.gradle
    paths:
      - .gradle/wrapper/
      - .gradle/caches/
    policy: pull-push
  before_script:
    - chmod +x gradlew
  script:
    - ./gradlew test --no-daemon --console=plain
  artifacts:
    when: always
    reports:
      junit: build/test-results/test/*.xml
    paths:
      - build/reports/tests/
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

test-frontend:
  stage: test
  image: node:22-alpine
  cache:
    key:
      files:
        - frontend/pnpm-lock.yaml
    paths:
      - frontend/node_modules/
      - .pnpm-store/
    policy: pull-push
  before_script:
    - corepack enable
    - corepack prepare pnpm@latest --activate
    - cd frontend && pnpm install --frozen-lockfile --config.storeDir=../.pnpm-store
  script:
    - pnpm run lint
    - pnpm run test:ci
  artifacts:
    when: always
    reports:
      junit: frontend/coverage/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: frontend/coverage/cobertura-coverage.xml
    expire_in: 7 days
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ============================================================================
# PACKAGE — build + push backend và frontend images song song
# Lưu ý: Dockerfile multi-stage tự compile JAR bên trong, không cần stage build riêng
# Image paths:
#   backend:  $CI_REGISTRY_IMAGE/backend:<sha>  :latest
#   frontend: $CI_REGISTRY_IMAGE/frontend:<sha> :latest
# ============================================================================
package-backend:
  stage: package
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  variables:
    SHA_TAG: $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA
    LATEST_TAG: $CI_REGISTRY_IMAGE/backend:latest
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor
        --context "$CI_PROJECT_DIR"
        --dockerfile "$CI_PROJECT_DIR/Dockerfile"
        --destination "$SHA_TAG"
        --destination "$LATEST_TAG"
        --cache=true
        --skip-tls-verify-registry=git.dth.com.vn:5050
        --label "org.opencontainers.image.revision=$CI_COMMIT_SHA"
  needs:
    - test-backend
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

package-frontend:
  stage: package
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  variables:
    SHA_TAG: $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA
    LATEST_TAG: $CI_REGISTRY_IMAGE/frontend:latest
    NEXT_PUBLIC_API_URL: "https://api.chatbot.x2h.com.vn"
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor
        --context "$CI_PROJECT_DIR/frontend"
        --dockerfile "$CI_PROJECT_DIR/frontend/Dockerfile"
        --destination "$SHA_TAG"
        --destination "$LATEST_TAG"
        --cache=true
        --skip-tls-verify-registry=git.dth.com.vn:5050
        --build-arg "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL"
        --label "org.opencontainers.image.revision=$CI_COMMIT_SHA"
  needs:
    - test-frontend
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ============================================================================
# DEPLOY — Production auto-deploy on main
# ============================================================================
deploy:
  stage: deploy
  image: alpine:3.21
  environment:
    name: production
    url: https://traffic-law.dth.com.vn
  variables:
    BACKEND_IMAGE: $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA
    FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - |
      ssh -o StrictHostKeyChecking=yes "$SERVER_USER@$SERVER_HOST" bash -s << EOF
        set -e
        cd /home/deploy/app/traffic-law
        git pull --ff-only origin main
        docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
        docker pull "$BACKEND_IMAGE"
        docker pull "$FRONTEND_IMAGE"
        BACKEND_IMAGE="$BACKEND_IMAGE" FRONTEND_IMAGE="$FRONTEND_IMAGE" \
          docker compose up -d --wait backend frontend
        docker image prune -f
        echo "Deploy OK: backend=$BACKEND_IMAGE frontend=$FRONTEND_IMAGE"
      EOF
  needs:
    - package-backend
    - package-frontend
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
