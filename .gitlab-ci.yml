# ============================================================================
# CI/CD — Vietnam Traffic Law Chatbot (monorepo)
# Repo: https://git.dth.com.vn/jmix-team/research/traffic-law/core
#
# Pipeline stages:
#   test            → backend unit tests + frontend lint/test  (main + MRs)
#   build           → compile bootJar  (main only)
#   package         → build & push backend + frontend images  (main only)
#   deploy          → production auto-deploy  (main only)
#
# Required CI/CD Variables (Settings → CI/CD → Variables):
#   SSH_PRIVATE_KEY   — private key deploy (protected, not masked)
#   SSH_KNOWN_HOSTS   — output of: ssh-keyscan <server-host>
#   SERVER_USER       — SSH user trên server (e.g. deploy)
#   SERVER_HOST       — IP hoặc hostname server
#
# GitLab built-ins (tự động):
#   CI_REGISTRY, CI_REGISTRY_IMAGE, CI_REGISTRY_USER, CI_REGISTRY_PASSWORD
# ============================================================================

stages:
  - test
  - build
  - package
  - deploy

variables:
  DOCKER_BUILDKIT: "1"
  DOCKER_TLS_CERTDIR: "/certs"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

default:
  interruptible: true

# ============================================================================
# TEST — backend + frontend chạy song song
# ============================================================================
test-backend:
  stage: test
  image: eclipse-temurin:25-jdk-alpine@sha256:6376112b998b14a1ab3ec7f4a47f045a07c021320f1556cd9074d480c6e553b5
  services:
    - name: pgvector/pgvector:pg16
      alias: postgres
  variables:
    POSTGRES_DB: traffic_law_test
    POSTGRES_USER: app
    POSTGRES_PASSWORD: app_test_secret
    SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/traffic_law_test"
    SPRING_DATASOURCE_USERNAME: app
    SPRING_DATASOURCE_PASSWORD: app_test_secret
    SPRING_AI_OPENAI_API_KEY: dummy-key-not-used-in-unit-tests
  cache:
    key:
      files:
        - build.gradle
        - settings.gradle
    paths:
      - .gradle/wrapper/
      - .gradle/caches/
    policy: pull-push
  before_script:
    - chmod +x gradlew
  script:
    - ./gradlew test --no-daemon --console=plain
  artifacts:
    when: always
    reports:
      junit: build/test-results/test/*.xml
    paths:
      - build/reports/tests/
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

test-frontend:
  stage: test
  image: node:22-alpine@sha256:10867d5406692dbcd5cec6fe62cee821f2af771bc4ef24519e843fd6367357f5
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/node_modules/
    policy: pull-push
  before_script:
    - cd frontend && npm ci
  script:
    - npm run lint
    - npm run test:ci
  artifacts:
    when: always
    reports:
      junit: frontend/coverage/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: frontend/coverage/cobertura-coverage.xml
    expire_in: 7 days
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ============================================================================
# BUILD — compile bootJar (backend only)
# ============================================================================
build:
  stage: build
  image: eclipse-temurin:25-jdk-alpine@sha256:6376112b998b14a1ab3ec7f4a47f045a07c021320f1556cd9074d480c6e553b5
  cache:
    key:
      files:
        - build.gradle
        - settings.gradle
    paths:
      - .gradle/wrapper/
      - .gradle/caches/
    policy: pull
  before_script:
    - chmod +x gradlew
  script:
    - ./gradlew bootJar --no-daemon --console=plain -x test
  artifacts:
    paths:
      - build/libs/*.jar
    expire_in: 1 day
  needs:
    - test-backend
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ============================================================================
# PACKAGE — build + push backend và frontend images song song
# Image paths:
#   backend:  $CI_REGISTRY_IMAGE/backend:<sha>  :latest
#   frontend: $CI_REGISTRY_IMAGE/frontend:<sha> :latest
# ============================================================================
package-backend:
  stage: package
  image: docker:26-cli
  services:
    - docker:26-dind
  variables:
    SHA_TAG: $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA
    LATEST_TAG: $CI_REGISTRY_IMAGE/backend:latest
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      docker build \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --cache-from "$LATEST_TAG" \
        --tag "$SHA_TAG" \
        --tag "$LATEST_TAG" \
        --label "org.opencontainers.image.revision=$CI_COMMIT_SHA" \
        --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        .
    - docker push "$SHA_TAG"
    - docker push "$LATEST_TAG"
  needs:
    - build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

package-frontend:
  stage: package
  image: docker:26-cli
  services:
    - docker:26-dind
  variables:
    SHA_TAG: $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA
    LATEST_TAG: $CI_REGISTRY_IMAGE/frontend:latest
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      docker build \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --cache-from "$LATEST_TAG" \
        --tag "$SHA_TAG" \
        --tag "$LATEST_TAG" \
        --label "org.opencontainers.image.revision=$CI_COMMIT_SHA" \
        --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        frontend/
    - docker push "$SHA_TAG"
    - docker push "$LATEST_TAG"
  needs:
    - test-frontend
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ============================================================================
# DEPLOY — Production auto-deploy on main
# ============================================================================
deploy:
  stage: deploy
  image: alpine:3.21@sha256:a90cb6b4c9917a8d0604cfb8f967edc828c75d139602258d321ce4e7960f4795
  environment:
    name: production
    url: https://traffic-law.dth.com.vn
  variables:
    BACKEND_IMAGE: $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA
    FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - |
      ssh -o StrictHostKeyChecking=yes "$SERVER_USER@$SERVER_HOST" bash -s << EOF
        set -e
        docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
        docker pull "$BACKEND_IMAGE"
        docker pull "$FRONTEND_IMAGE"
        cd /home/deploy/app/traffic-law
        BACKEND_IMAGE="$BACKEND_IMAGE" FRONTEND_IMAGE="$FRONTEND_IMAGE" \
          docker compose up -d --no-deps --wait backend frontend
        docker image prune -f
        echo "Deploy OK: backend=$BACKEND_IMAGE frontend=$FRONTEND_IMAGE"
      EOF
  needs:
    - package-backend
    - package-frontend
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
