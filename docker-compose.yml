# ============================================================================
# Deployment — Vietnam Traffic Law Chatbot (monorepo)
# Server: /home/deploy/app/traffic-law/
#
# Setup lần đầu:
#   cp .env.example .env && nano .env
#   docker compose up -d
#
# CI/CD deploy tự động qua SSH:
#   BACKEND_IMAGE=<sha-tag> FRONTEND_IMAGE=<sha-tag> \
#     docker compose up -d --no-deps --wait backend frontend
# ============================================================================

services:

  backend:
    image: ${BACKEND_IMAGE:-git.dth.com.vn:5050/jmix-team/research/traffic-law/core/backend:latest}
    container_name: traffic-law-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: "${DB_URL}"
      SPRING_DATASOURCE_USERNAME: "${DB_USERNAME}"
      SPRING_DATASOURCE_PASSWORD: "${DB_PASSWORD}"
      SPRING_AI_OPENAI_API_KEY: "${OPENAI_API_KEY}"
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-prod}"
    ports:
      - "8087:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - app-network

  frontend:
    image: ${FRONTEND_IMAGE:-git.dth.com.vn:5050/jmix-team/research/traffic-law/core/frontend:latest}
    container_name: traffic-law-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}"
    ports:
      - "3333:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - app-network

networks:
  app-network:
    external: true
