# ============================================================================
# Deployment — Vietnam Traffic Law Chatbot (monorepo)
# Server: /home/deploy/app/traffic-law/
#
# Setup lần đầu:
#   cp .env.example .env && nano .env
#   docker compose up -d
#
# CI/CD deploy tự động qua SSH:
#   BACKEND_IMAGE=<sha-tag> FRONTEND_IMAGE=<sha-tag> \
#     docker compose up -d --no-deps --wait backend frontend
# ============================================================================

services:

  backend:
    image: ${BACKEND_IMAGE:-git.dth.com.vn:5050/jmix-team/research/traffic-law/core/backend:latest}
    container_name: traffic-law-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: "${DB_URL}"
      SPRING_DATASOURCE_USERNAME: "${DB_USERNAME}"
      SPRING_DATASOURCE_PASSWORD: "${DB_PASSWORD}"
      SPRING_AI_OPENAI_API_KEY: "${OPENAI_API_KEY}"
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-prod}"
      APP_CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL}"
      EMBEDDING_API_KEY: "${EMBEDDING_API_KEY}"
    ports:
      - "8087:8089"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8089/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - app-network

  frontend:
    image: ${FRONTEND_IMAGE:-git.dth.com.vn:5050/jmix-team/research/traffic-law/core/frontend:latest}
    container_name: traffic-law-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: "https://api.chatbot.x2h.com.vn"
    ports:
      - "3333:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - app-network

networks:
  app-network:
    external: true
