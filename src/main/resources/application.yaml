spring:
  application:
    name: traffic-law-chatbot
  config:
    import: optional:file:.env[.properties]
  autoconfigure:
    exclude:
      - org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration
  docker:
    compose:
      enabled: false
  datasource:
    url: ${DB_URL:jdbc:postgresql://10.123.123.174:5432/traffic_law}
    username: ${DB_USERNAME:traffic_user}
    password: ${DB_PASSWORD:traffic_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
  ai:
    vectorstore:
      pgvector:
        initialize-schema: false
        schema-name: public
        dimensions: 1536
        distance-type: COSINE_DISTANCE
        index-type: HNSW
        table-name: kb_vector_store
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never
    openai:
      api-key: ${OPENROUTER_API_KEY:none}
      embedding:
        base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
        api-key: ${OPENROUTER_API_KEY:none}
        embeddings-path: /embeddings
        options:
          model: ${EMBEDDING_MODEL:openai/text-embedding-3-small}
  servlet:
    encoding:
      enabled: true
      charset: UTF-8
      force: true
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  task:
    execution:
      pool:
        core-size: 4
        max-size: 10
        queue-capacity: 100
      thread-name-prefix: ingestion-
  threads:
    virtual:
      enabled: true

app:
  ai:
    base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
    # Default chat → fastest/cheapest OpenAI qua OpenRouter (user chọn model
    # nặng hơn qua dropdown khi cần scenario analysis phức tạp).
    chat-model: ${CHAT_MODEL:openai/gpt-4o-mini}
    evaluator-model: ${EVALUATOR_MODEL:openai/gpt-4o-mini}
    models:
      # --- Anthropic ---
      - id: anthropic/claude-sonnet-4.6
        display-name: "Claude Sonnet 4.6"
        base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
        api-key: ${OPENROUTER_API_KEY:dummy}
      - id: anthropic/claude-opus-4.6
        display-name: "Claude Opus 4.6"
        base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
        api-key: ${OPENROUTER_API_KEY:dummy}
      - id: anthropic/claude-haiku-4.5
        display-name: "Claude Haiku 4.5"
        base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
        api-key: ${OPENROUTER_API_KEY:dummy}
      # --- OpenAI ---
      - id: openai/gpt-5.1
        display-name: "GPT-5.1"
        base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
        api-key: ${OPENROUTER_API_KEY:dummy}
      - id: openai/gpt-4o-mini
        display-name: "GPT-4o Mini"
        base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
        api-key: ${OPENROUTER_API_KEY:dummy}
      # --- Google ---
      - id: google/gemini-3.1-pro
        display-name: "Gemini 3.1 Pro"
        base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
        api-key: ${OPENROUTER_API_KEY:dummy}
      # --- DeepSeek (rẻ, mạnh cho reasoning) ---
      - id: deepseek/deepseek-v3.2
        display-name: "DeepSeek V3.2"
        base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
        api-key: ${OPENROUTER_API_KEY:dummy}
      # --- Extended-context variant của Sonnet 4.5 (1M tokens) ---
      - id: anthropic/claude-sonnet-4.5:extended
        display-name: "Claude Sonnet 4.5 (1M context)"
        base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
        api-key: ${OPENROUTER_API_KEY:dummy}
  chat:
    retrieval:
      top-k: 5

server:
  port: 8089

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

