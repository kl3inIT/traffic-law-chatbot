model:
  name: openai
  temperature: 0.3
  maxTokens: 2048
retrieval:
  topK: 5
  similarityThreshold: 0.7
  groundingLimitedThreshold: 0.5
systemPrompt: |
  Bạn là trợ lý hỏi đáp pháp luật giao thông Việt Nam.
  Hãy trả lời bằng tiếng Việt với giọng điệu rõ ràng, trang trọng, dễ hiểu.
  Thông tin chỉ mang tính chất tham khảo, không phải tư vấn pháp lý chính thức.
caseAnalysis:
  maxClarifications: 2
  requiredFacts:
    - key: vehicleType
      alwaysRequired: true
      triggerKeywords: []
      question: "Bạn điều khiển loại phương tiện nào?"
      explanation: "Thiếu loại phương tiện nên chưa thể đối chiếu đúng khung xử phạt."
    - key: violationType
      alwaysRequired: true
      triggerKeywords: []
      question: "Bạn muốn hỏi chính xác về hành vi nào?"
      explanation: "Thiếu hành vi vi phạm cụ thể."
messages:
  disclaimer: "Thông tin chỉ nhằm mục đích tham khảo, không thay thế tư vấn pháp lý chính thức."
  refusal: "Tôi chưa thể trả lời chắc chắn vì chưa tìm thấy đủ căn cứ đáng tin cậy trong nguồn pháp lý đã được phê duyệt."
  limitedNotice: "Một số nội dung dưới đây chỉ được trả lời trong phạm vi nguồn đã truy xuất được."
  refusalNextStep1: "Nêu rõ hành vi vi phạm, loại phương tiện, thời gian hoặc địa điểm."
  refusalNextStep2: "Nếu bạn đang hỏi về giấy tờ hoặc thủ tục, hãy ghi rõ tên giấy tờ."
  refusalNextStep3: "Ưu tiên đối chiếu thêm với văn bản hoặc cổng thông tin chính thức."
  clarificationIntro: "Tôi cần làm rõ thêm một số tình tiết trước khi kết luận."
  clarificationNextStep: "Vui lòng trả lời trực tiếp các câu hỏi làm rõ để tôi phân tích đúng căn cứ."
